<!DOCTYPE html>
<html lang="{{ page.lang | default: 'en-US' }}">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title and page.title != '' %}{{ page.title }} — {% endif %}{{ site.title | default: 'Marco Combetto' }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  {% include head-custom.html %}
</head>
<body>

  <div id="header_wrap" class="outer">
    <header class="inner">
      <h1 id="project_title">{{ site.title | default: 'Marco Combetto' }}</h1>
      <h2 id="project_tagline">{{ site.description | default: '' }}</h2>
    </header>
  </div>

  <div id="nav_wrap">
    {% include nav.html %}
  </div>

  <div id="main_content_wrap" class="outer">
    <section id="main_content" class="inner">
      {{ content }}
    </section>
  </div>

  <div id="footer_wrap" class="outer">
    <footer class="inner">
      <p>&copy; 1969&ndash;{{ 'now' | date: '%Y' }} Marco Combetto &mdash; AI &amp; Digital Transformation Expert</p>
    </footer>
  </div>

</body>
</html>
