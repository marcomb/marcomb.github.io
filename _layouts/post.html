---
layout: default
---
<article class="blog-post">
  <h1>{{ page.title }}</h1>
  <p class="post-meta"><em>{{ page.date | date: "%B %-d, %Y" }}</em></p>
  {% if page.image %}<img src="{{ page.image }}" alt="{{ page.title }}" style="max-width:100%;">{% endif %}
  {{ content }}
  {% if page.source_url %}<p>🔗 <a href="{{ page.source_url }}">Read the original article</a></p>{% endif %}
</article>
